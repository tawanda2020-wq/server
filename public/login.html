<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS-CTS · Parent Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body d-flex align-items-center justify-content-center">
  <div class="login-card shadow-lg">
    <div class="text-center mb-4">
      <div class="brand-mark mx-auto mb-2">🧭</div>
      <h1 class="brand-title">GPS-BASED CHILD TRACKING SYSTEM</h1>
      <p class="brand-subtitle">&amp; Health Dashboard</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="name" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <div id="loginError" class="alert alert-danger py-2 d-none"></div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Log In</button>
    </form>

    <p class="demo-hint text-center mt-3">
      Demo credentials: <code>parent</code> / <code>demo1234</code>
      <!-- <br><span class="text-muted small">(set in the server's .env file)</span> -->
    </p>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('loginError');
  errBox.classList.add('d-none');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json();
      errBox.textContent = data.error || 'Login failed';
      errBox.classList.remove('d-none');
    }
  } catch (err) {
    errBox.textContent = 'Could not reach the server. Please try again.';
    errBox.classList.remove('d-none');
  }
});
</script>
</body>
</html>
